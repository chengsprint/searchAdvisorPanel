<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V2 단일 계정 테스트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #020617;
      font-family: Pretendard, system-ui, sans-serif;
      overflow: hidden;
    }
    #test-bg {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 70% 50%, #0f172a 0%, #020617 70%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
    }
    #test-title {
      font-size: 28px; font-weight: 900; color: #f8fafc;
      letter-spacing: -0.03em;
    }
    #test-sub { font-size: 14px; color: #64748b; }
    #test-badge {
      font-size: 11px; background: #10b98120; border: 1px solid #10b98144;
      color: #10b981; padding: 4px 12px; border-radius: 999px; font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="test-bg">
    <div id="test-badge">V2 SINGLE ACCOUNT TEST</div>
    <div id="test-title">단일 계정 더미 데이터 테스트</div>

  </div>
